<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup Form</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-image: url("https://i.pinimg.com/736x/fc/39/ca/fc39caff68f41da8351c1ab52be3bd27.jpg");
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    
}

.container{
    width:340px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.google-btn{
    width:100%;
    padding:12px;
    border-radius:25px;
    border:1px solid #ddd;
    background:#fff;
    cursor:pointer;
    font-size:14px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

.google-btn svg{
    width:20px;
    height:20px;
}

.or{
    text-align:center;
    margin:10px 0;
    color:#777;
    font-size:14px;
}

.name-group{
    display:flex;
    gap:10px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    background:#f2f2f2;
    border-radius:12px;
    margin-top:10px;
    font-size:14px;
}

.password-box{
    position:relative;
}

.eye{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    user-select:none;
}

.create-btn{
    width:100%;
    padding:14px;
    border:none;
    background:black;
    color:white;
    border-radius:25px;
    font-size:15px;
    margin-top:15px;
    cursor:pointer;
}

.create-btn:hover{
    background:#222;
}

.login{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.error{
    color:red;
    font-size:12px;
    margin-top:8px;
}
</style>
</head>
<body>
<div class="container">
<a href="home.html"><button class="google-btn">
    <svg viewBox="0 0 533.5 544.3">
        <path fill="#4285F4" d="M533.5 278.4c0-17.8-1.5-35-4.4-51.8H272v98h146.9c-6.3 34-25.2 62.8-53.6 82v68h86.7c50.7-46.7 81.5-115.7 81.5-196.2z"/>
        <path fill="#34A853" d="M272 544.3c72.6 0 133.5-24 178-65.3l-86.7-68c-24.1 16.1-55.1 25.7-91.3 25.7-70.3 0-129.9-47.3-151.2-111.2H33.3v69.7C77.8 490.1 169 544.3 272 544.3z"/>
        <path fill="#FBBC05" d="M120.8 323.5c-10.5-31.2-10.5-64.9 0-96.1V157.7H33.3c-38.5 75.7-38.5 166.1 0 241.8l87.5-76z"/>
        <path fill="#EA4335" d="M272 107.5c37.2 0 70.6 12.8 96.8 33.2l72.5-72.5C405.6 31.5 344.7 7.5 272 7.5 169 7.5 77.8 61.7 33.3 157.7l87.5 69.7c21.3-63.9 80.9-111.2 151.2-111.2z"/>
    </svg>
    Sign in with Google
</button></a>

<div class="or">or</div>

<form id="signupForm" action="home.html">
    <div class="name-group">
        <input type="text" id="fname" placeholder="First Name" required>
        <input type="text" id="lname" placeholder="Last Name" required>
    </div>

    <div class="password-box">
        <input type="password" id="password" placeholder="Password" required>
        <span class="eye" id="togglePassword">👁</span>
    </div>

    <div class="password-box">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <span class="eye" id="toggleConfirm">👁</span>
    </div>

    <p class="error" id="error"></p>

    <button class="create-btn" type="submit">Create Account</button>
</form>

<div class="login">
    Have an account? <a href="index.html">Log in here</a>
</div>

<script src="script.js"></script>
</body>
</html>
